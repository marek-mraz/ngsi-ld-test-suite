services:
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: "stellio-kafka${SUFFIX}"
    hostname: stellio-kafka
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://stellio-kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@stellio-kafka:29093'
      KAFKA_LISTENERS: CONTROLLER://stellio-kafka:29093,PLAINTEXT://stellio-kafka:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG4J_ROOT_LOGLEVEL: INFO
      CLUSTER_ID: ZGE2MTQ4NDk4NGU3NDE2Mm
  postgres:
    image: stellio/stellio-timescale-postgis:16-2.17.2-3.5
    container_name: "stellio-postgres${SUFFIX}"
    environment:
      - POSTGRES_USER=stellio
      - POSTGRES_PASS=stellio_password
      - POSTGRES_DBNAME=stellio_search,stellio_subscription
      - POSTGRES_MULTIPLE_EXTENSIONS=postgis,timescaledb,pgcrypto
      - ACCEPT_TIMESCALE_TUNING=TRUE
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - stellio-postgres-storage:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U stellio"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
  api-gateway:
    container_name: "stellio-api-gateway${SUFFIX}"
    image: stellio/stellio-api-gateway:${DOCKER_TAG:-plug-test-latest}
    environment:
      - SPRING_PROFILES_ACTIVE=${ENVIRONMENT:-docker}
    ports:
      - "${PORT}:8080"
  search-service:
    container_name: "stellio-search-service${SUFFIX}"
    image: stellio/stellio-search-service:${DOCKER_TAG:-plug-test-latest}
    environment:
      - SPRING_PROFILES_ACTIVE=${ENVIRONMENT:-docker}
      - SPRING_R2DBC_URL=r2dbc:pool:postgresql://postgres/stellio_search
      - SPRING_FLYWAY_URL=jdbc:postgresql://postgres/stellio_search
      - APPLICATION_AUTHENTICATION_ENABLED=false
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
  subscription-service:
    container_name: "stellio-subscription-service${SUFFIX}"
    image: stellio/stellio-subscription-service:${DOCKER_TAG:-plug-test-latest}
    environment:
      - SPRING_PROFILES_ACTIVE=${ENVIRONMENT:-docker}
      - SPRING_R2DBC_URL=r2dbc:pool:postgresql://postgres/stellio_subscription
      - SPRING_FLYWAY_URL=jdbc:postgresql://postgres/stellio_subscription
      - SUBSCRIPTION_ENTITY-SERVICE-URL=http://search-service:8093
      - APPLICATION_AUTHENTICATION_ENABLED=false
      - SUBSCRIPTION_STELLIO_URL=http://${LOCAL_IP:-localhost}:${PORT}

    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

volumes:
  stellio-postgres-storage:
    name: "stellio-postgres-storage${SUFFIX}"
